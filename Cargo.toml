[package]
name = "commonmeta"
version = "0.1.1"
edition = "2024"
authors = ["Front Matter <info@front-matter.de>"]
description = "Library for conversions to/from the Commonmeta scholarly metadata format"
license = "MIT"
readme = "README.md"

[lib]
name = "commonmeta"
path = "src/lib.rs"

[[bin]]
name = "commonmeta"
path = "src/main.rs"

[dependencies]
reqwest = { version = "0.12", features = ["json", "blocking"] }
tokio = { version = "1", features = ["full"] }
clap = "4.0"
rand = "0.8"
regex = "1.9"
base32 = "0.4"
lazy_static = "1.5.0"
serde = { version = "1.0.219", features = ["derive"] }
url = "2.5.4"
serde_json = "1.0.140"
zip = "2.6.1"
thiserror = "2.0.12"
chrono = { version = "0.4.40", features = ["clock"] }
avro-rs = "0.13.0"
serde_yaml = "0.9.34"
csv = "1.3.1"
hayagriva = "0.10"
biblatex = "0.12"
unic-langid = "0.9"
quick-xml = { version = "0.37", features = ["serialize", "overlapped-lists"] }
unicode-normalization = "0.1"
ammonia = "4"
scraper = "0.22"
rusqlite = { version = "0.32", features = ["bundled"] }
flate2 = "1.0"
